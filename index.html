<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Radio Chicha</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background: #d92323;
      padding: 20px;
      font-size: 2em;
      font-weight: bold;
    }
    #player {
      margin: 30px auto;
      width: 90%;
    }
    #playlist {
      list-style: none;
      padding: 0;
      margin: 20px auto;
      max-width: 600px;
    }
    #playlist li {
      padding: 15px;
      background: #222;
      margin: 5px;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }
    #playlist li:hover {
      background: #444;
    }
  </style>
</head>
<body>

<header>🎧 Mi Radio Chicha</header>

<audio id="player" controls>
  <source src="toca eelgir.mpeg" type="audio/mpeg">
  Tu navegador no soporta audio.
</audio>

<ul id="playlist">
  <li data-src="toca eelgir.mpeg">🎶 Canción Chicha 1</li>
  <li data-src="musica/cancion2.mp3">🎶 Canción Chicha 2</li>
  <li data-src="musica/cancion3.mp3">🎶 Canción Chicha 3</li>
</ul>

<script>
  const player = document.getElementById('player');
  const list = document.querySelectorAll('#playlist li');

  list.forEach(song => {
    song.addEventListener('click', function() {
      player.src = this.getAttribute('data-src');
      player.play();
    });
  });
</script>

</body>
</html>
